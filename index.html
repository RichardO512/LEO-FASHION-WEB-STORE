<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home</title>
    <!-- <link rel="stylesheet" href="../styles/subsection.css" /> -->
    <!--  -->
    <!-- Add icon library -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
    />
    <style>
      body {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        background-color: #ffffff;
        font-family: "Segoe UI", sans-serif;
        overflow-x: hidden;
        height: 100vh;
      }

      /* --- Fixed Navigation Bar --- */
      .nav {
        list-style: none;
        background-color: #ffffff;
        border: 2px solid #000000;
        padding: 15px 40px;
        margin: 0;
        display: flex;
        align-items: center;
      }
      /* sticky */
      .nav {
        position: sticky;
        top: 0;
        z-index: 99;
      }
      /*  */
      /*  */
      .nav > li,
      .nav > span {
        display: flex;
        align-items: center;
        white-space: nowrap;
      }

      .nav > li > a {
        text-decoration: none;
        color: #000000;
        font-size: 16px;
        margin: 5px;
        transition: 0.2s;
      }

      .nav > li > a:hover {
        background-color: #d9d9d9;
        padding: 10px;
        border-radius: 10%;
      }

      .nav > .current_file {
        text-decoration: underline;
        padding: 5px;
      }

      /* --- Centered Logo Section --- */
      .container {
        display: flex;
        align-items: center;
        gap: 15px;
        font-family: Arial, sans-serif;
        font-size: 40px;
        font-weight: bold;

        margin: 0 auto;

        padding-right: 120px;
        text-shadow: 8px 17px 0px rgba(0, 0, 0, 0.05);
      }

      .star {
        font-size: 30px;
        color: #d9d9d9;
        text-shadow: 8px 17px 0px rgba(0, 0, 0, 0.05);
      }
      /*  */
      /*  */
      /* cart */

      ul {
        display: flex;
        align-items: center;
        justify-content: space-between;
        list-style: none;
        background-color: #ffffff;
        border: 2px solid #000000;
        padding: 10px 40px;
        margin: 0;
      }

      .cart-item {
        margin-left: 20px;
        font-size: 24px;
      }

      .cart-item a {
        text-decoration: none;
        color: #000000;
        transition: transform 0.2s ease;
        display: inline-block;
      }

      .cart-item a:hover {
        transform: scale(1.1);
        background-color: transparent;
      }
      img {
        width: 250px;
        height: auto;
      }
      /* --- Project Grid & Cards --- */
      .project-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 25px;
        padding: 40px;
        max-width: 1300px;
        margin: 0 auto;
      }

      .card {
        background: white;
        border-radius: 15px;
        padding: 15px;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        transition: transform 0.3s ease;
        text-align: center;
      }

      .card:hover {
        transform: translateY(-10px);
        background: #d9d9d9;
        cursor: pointer;
      }

      .card h3 {
        color: #000000;
        margin: 15px 0;
      }
      /*  */

      /*  */
      .view-link {
        display: inline-block;
        background: #d9d9d9;
        color: #000000;
        text-decoration: none;
        padding: 8px 20px;
        border-radius: 5px;
        font-weight: bold;
      }

      /* --- Modals --- */
      .modal-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.85);
        z-index: 1000;
        justify-content: center;
        align-items: center;
      }

      .modal-overlay:target {
        display: flex;
      }

      .modal-content {
        background: white;
        padding: 20px;
        border-radius: 12px;
        width: 90%;
        height: 85%;
        position: relative;
      }

      .close-btn {
        position: absolute;
        top: 10px;
        right: 20px;
        font-size: 40px;
        text-decoration: none;
        color: #333;
      }

      .modal-content iframe {
        width: 100%;
        height: 95%;
        border: none;
      }
      /*  */
      /*  */

      /*  */
      /* bg-image  */

      /* 1. The Container */
      .bg-img {
        position: relative;
        width: 100%;
        min-height: 100vh;
        overflow-x: hidden;
      }

      .bg-img::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;

        /* --- RESIZE HERE --- */
        background-size: cover; /* Change to 'contain' or '50% 50%' if you want it smaller */
        background-position: center;
        background-repeat: no-repeat;

        /* Animation */
        animation: slideShow 9s infinite;
        transition: background-image 0.8s ease-in-out;
      }

      /* 3. Your Animation Stays the same */
      @keyframes slideShow {
        0%,
        33% {
          background-image: url("../images/Background-Image/3people.png");
        }
        34%,
        66% {
          background-image: url("../images/Background-Image/7people.png");
        }
        67%,
        100% {
          background-image: url("../images/Background-Image/bgimage1.png");
        }
      }

      ul,
      .project-grid {
        position: relative;
        z-index: 1;
      }
      /*  */
      /*  */
      /* footer */
      footer > ul li > a {
        text-decoration: none;
        color: #000000;
        font-size: 16px;
        /* Keep consistent padding */
        padding: 5px;
        transition: 0.2s;
        border-radius: 4px; /* Optional: softer radius */
      }

      footer > ul li > a:hover {
        background-color: #d9d9d9;
      }
    </style>
  </head>
