<!DOCTYPE html>
<head>
 <title> L.E.O </title>
<style>
    h2 { /* leo*/
	margin: 10px;
	font-size: 40px;
	text-align: center;
	}
	
    .container { /*contains women and men selection cards */
        display: flex;
        gap: 20px;
        justify-content: center;
        padding: 20px;
		transition:.5s;
    }
	
    .container1 { /* women's */
        border: 1px solid black;
		border-radius: 10px;
        padding: 20px;
        text-align: center;
        width: 300px;
		align-items : center;
		transition:.5s;
    }
    
    .container1 img {
        width: 100%;
        height: auto;
        margin-bottom: 10px;
    }
	
	.container1:hover {
	transform:scale(1.1);
	cursor: pointer;
    }
	
	.container2 { /*men's*/
        border: 1px solid black;
		border-radius: 10px;
        padding: 20px;
        text-align: center;
        width: 300px;
		align-items : center;
		transition:.5s;
    }
    
    .container2 img {
	width: 100%;
	height: auto;
	margin-bottom: 10px;
    }
	
	.container2:hover {
	transform:scale(1.1);
	cursor: pointer;
    }
	
	.container a {
	color:black;
	text-decoration: none;
	}
   
</style>
</head>
<body>

<h2> L ★ E ★ O </h2>
<div class="container">
    <div class="container1">
	<a href="insert link to women's page here" class="MEN">
        <img src="women.jpg" alt="Women's">
		</a>
	<div>WOMEN</div>
	</div>
	
    <div class="container2">
	<a href="insert link to men's page here" class="MEN">
        <img src="men.jpg" alt="Men's">
		</a>
		<div>MEN</div>
	</div>
</div>

</body>
</html>
